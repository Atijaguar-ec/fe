<div class="keypad-container">
  <button class="keypad-btn" (click)="onKeyClick('1')">1</button>
  <button class="keypad-btn" (click)="onKeyClick('2')">2</button>
  <button class="keypad-btn" (click)="onKeyClick('3')">3</button>
  <button class="keypad-btn" (click)="onKeyClick('4')">4</button>
  <button class="keypad-btn" (click)="onKeyClick('5')">5</button>
  <button class="keypad-btn" (click)="onKeyClick('6')">6</button>
  <button class="keypad-btn" (click)="onKeyClick('7')">7</button>
  <button class="keypad-btn" (click)="onKeyClick('8')">8</button>
  <button class="keypad-btn" (click)="onKeyClick('9')">9</button>
  <button class="keypad-btn action-btn" (click)="onKeyClick('CLEAR')">C</button>
  <button class="keypad-btn" (click)="onKeyClick('0')">0</button>
  <button class="keypad-btn" (click)="onKeyClick('.')">.</button>
  <button class="keypad-btn action-btn backspace-btn" (click)="onKeyClick('BACKSPACE')">⌫ Borrar</button>
</div>
