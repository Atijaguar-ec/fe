# ============================================================================
# 🦐 Frontend CI/CD - DUFER (Staging + Production)
# ============================================================================
# Este workflow despliega el frontend para DUFER (Camarón)
# - Staging: camaron.atijaguar.com (develop branch)
# - Production: inatrace.empacadoradufer.com
#
# Triggers:
# - develop branch → deploy to develop (staging)
# - tags dufer-fe-v* → deploy to production
# ============================================================================

name: 🦐 Frontend DUFER

on:
  push:
    branches: [develop]
    tags:
      - "dufer-fe-v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-inatrace
  NODE_VERSION: "14"
  SWAGGER_DOCS_HOST: https://inatrace.atijaguar.com/api/v3/api-docs
  PRIMARY_PRODUCT_TYPE: SHRIMP

jobs:
  quality:
    name: 🔍 Code Quality & Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'staging'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm run test -- --watch=false --progress=false

  build:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest
    needs: quality
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/dufer-fe-v'))) ||
      (github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Generate metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/dufer-fe-v* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            TAG="develop-shrimp"
          else
            TAG="manual-${{ github.run_id }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image ref
        id: image_ref
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true
          use: true

      - name: 🏗️ Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_ref.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_OPTIMIZATION=true
            BUILD_CONFIG=production-shrimp

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: develop-shrimp
      url: http://camaron.atijaguar.com
    steps:
      - name: 📥 Checkout deployment configs
        uses: actions/checkout@v4

      - name: 📁 Ensure remote directory exists
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          fingerprint: ${{ secrets.DEV_SSH_FINGERPRINT }}
          script: mkdir -p /opt/inatrace/frontend/dev-shrimp

      - name: 📤 Upload configs
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          fingerprint: ${{ secrets.DEV_SSH_FINGERPRINT }}
          source: "ci/docker-compose.yml,nginx.conf"
          target: "/opt/inatrace/frontend/dev-shrimp"
          strip_components: 1

      - name: 📝 Prepare .env (staging)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"; IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          TAG="${{ needs.build.outputs.image-tag }}"
          cat > .env <<EOF
          FE_IMAGE_NAME=$IMAGE
          FE_TAG=$TAG
          NODE_ENV=development
          PRIMARY_PRODUCT_TYPE=SHRIMP
          CONTAINER_NAME=inatrace-fe-dev-shrimp
          HOST_HTTP_PORT=8082
          FRONTEND_NETWORK=inatrace-frontend-network
          BACKEND_NETWORK=inatrace-backend-network
          DOMAIN=camaron.atijaguar.com
          COMPANY_NAME="INATrace Shrimp"
          COMPANY_THEME=shrimp
          TRAEFIK_ENABLE=true
          TRAEFIK_ROUTER_NAME=inatrace-fe-dev-shrimp
          TRAEFIK_ROUTER_RULE='Host(\`camaron.atijaguar.com\`)'
          TRAEFIK_ENTRYPOINTS=web
          TRAEFIK_CERT_RESOLVER=
          HEALTHCHECK_URL=http://localhost/health
          NGINX_CONF_PATH=./nginx.conf
          EOF

      - name: 📤 Upload .env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          fingerprint: ${{ secrets.DEV_SSH_FINGERPRINT }}
          source: ".env"
          target: "/opt/inatrace/frontend/dev-shrimp"

      - name: 🚀 Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          fingerprint: ${{ secrets.DEV_SSH_FINGERPRINT }}
          script: |
            cd /opt/inatrace/frontend/dev-shrimp
            docker compose pull
            docker compose up -d
            echo "✅ Staging deployed!"

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/dufer-fe-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: prod-dufer
      url: https://inatrace.empacadoradufer.com
    steps:
      - name: 📥 Checkout deployment configs
        uses: actions/checkout@v4

      - name: 📁 Ensure remote directory exists
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_DUFER_HOST }}
          username: ${{ secrets.PROD_DUFER_USER }}
          password: ${{ secrets.PROD_DUFER_PASSWORD }}
          script: mkdir -p /opt/inatrace/frontend/prod

      - name: 📤 Upload configs
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_DUFER_HOST }}
          username: ${{ secrets.PROD_DUFER_USER }}
          password: ${{ secrets.PROD_DUFER_PASSWORD }}
          source: "ci/docker-compose.yml,nginx.conf"
          target: "/opt/inatrace/frontend/prod"
          strip_components: 1

      - name: 📝 Prepare .env (prod)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"; IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          TAG="${{ needs.build.outputs.image-tag }}"
          cat > .env <<EOF
          FE_IMAGE_NAME=$IMAGE
          FE_TAG=$TAG
          NODE_ENV=production
          PRIMARY_PRODUCT_TYPE=SHRIMP
          CONTAINER_NAME=inatrace-fe-prod-shrimp
          HOST_HTTP_PORT=80
          FRONTEND_NETWORK=inatrace-frontend-network
          BACKEND_NETWORK=inatrace-backend-network
          DOMAIN=inatrace.empacadoradufer.com
          COMPANY_NAME="DUFER"
          COMPANY_THEME=shrimp
          TRAEFIK_ENABLE=true
          TRAEFIK_ROUTER_NAME=inatrace-fe-prod-shrimp
          TRAEFIK_ROUTER_RULE='Host(\`inatrace.empacadoradufer.com\`)'
          TRAEFIK_ENTRYPOINTS=websecure
          TRAEFIK_CERT_RESOLVER=letsencrypt
          HEALTHCHECK_URL=http://localhost/health
          NGINX_CONF_PATH=./nginx.conf
          EOF

      - name: 📤 Upload .env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_DUFER_HOST }}
          username: ${{ secrets.PROD_DUFER_USER }}
          password: ${{ secrets.PROD_DUFER_PASSWORD }}
          source: ".env"
          target: "/opt/inatrace/frontend/prod"

      - name: 🚀 Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_DUFER_HOST }}
          username: ${{ secrets.PROD_DUFER_USER }}
          password: ${{ secrets.PROD_DUFER_PASSWORD }}
          script: |
            cd /opt/inatrace/frontend/prod
            docker compose pull
            docker compose up -d
            echo "✅ DUFER Production deployed!"
